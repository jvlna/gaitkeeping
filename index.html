<style>
  :root {
    --bg: #b0afaf;
    --panel: #b7b4b4;
    --panel2: #b3b2b2;
    --border: #c9c9c9;
    --gold: #727272;
    --gold-dim: #b6b3aa;
    --text: #050403;
    --text-dim: #2f2f2f;
    --red: #c0392b;
    --blue: #1a5c8a;
    --purple: #6c3483;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #0e0e0e;
    text-transform: uppercase;
  }

  header p {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  .legend-pills {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: Georgia, serif;
    letter-spacing: 0.05em;
  }

  .pill-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  #map { flex: 1; z-index: 1; }

  #timeline-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 12px 24px 14px;
    flex-shrink: 0;
  }

  .tl-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 10px;
  }

  .left-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .play-reset-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .play-reset-group button {
    padding: 3px 10px;
    font-size: 10px;
  }

  #year-display {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.05em;
    min-width: 140px;
  }

  #period-display {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    flex: 1;
  }

  #count-display {
    font-family: Georgia, serif;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }

  .btn-group {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 1px;
  }

  button:hover, button.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(103, 102, 102, 0.07);
  }

  .slider-wrap { position: relative; padding-bottom: 18px; }

  #tl-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  #tl-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--panel);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    cursor: grab;
  }

  #tl-slider::-webkit-slider-thumb:active { cursor: grabbing; }

  .ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .tick {
    font-size: 10px;
    color: var(--text-dim);
    font-family: Georgia, serif;
    letter-spacing: 0.02em;
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: #faf7f0 !important;
    border: 1px solid var(--border) !important;
    border-radius: 2px !important;
    box-shadow: 0 3px 16px rgba(0,0,0,0.15) !important;
    color: var(--text) !important;
    font-family: Georgia, serif !important;
  }

  .leaflet-popup-tip { background: #faf7f0 !important; }

  .popup-site {
    font-family: Georgia, serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }

  .popup-year {
    font-size: 15px;
    color: var(--text);
    font-weight: 300;
    margin-bottom: 5px;
  }

  .popup-meta {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.65;
  }

  #mode-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: Georgia, serif;
    letter-spacing: 0.06em;
  }

</style>
</head>

const map = L.map('map', { center: [48, 20], zoom: 4 });

// Fit to full data extent: Iceland/Portugal → China/Mongolia
map.fitBounds([
  [34, -25],   // SW corner (S Spain / W Portugal)
  [68, 120]    // NE corner (N Iceland / E China)
], { padding: [20, 20] });

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO | Data sourced from <a href="https://doi.org/10.1016/j.cub.2016.07.001">Wutke, Saskia, et al. “The Origin of Ambling Horses.”</a> | Map code on <a href="https://github.com/jvlna/gaitkeeping">Github',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

function markerColor(d) {
  if (d.color === 'RED')    return '#c0392b';
  if (d.color === 'PURPLE') return '#7d3c98';
  return '#2471a3';
}

function periodLabel(y) {
  if (y <= -1200) return 'Pre-Iron Age · Bronze & Neolithic';
  if (y <= -800)  return 'Late Bronze Age · Iron Age transition';
  if (y <= -27)   return 'Iron Age';
  if (y <= 476)   return 'Classical Antiquity · Roman Era';
  if (y <= 1000)  return 'Early Medieval';
  return 'High Medieval';
}

function yearLabel(y) {
  if (y < 0) return Math.abs(y) + ' BC';
  if (y === 0) return '1 AD';
  return y + ' AD';
}

let markers = [];
let mode = 'cumulative';
let playing = false;
let playInterval = null;

const tooltip = document.getElementById('map-tooltip');

document.addEventListener('mousemove', (e) => {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
});

function makeMarker(d) {
  const color = markerColor(d);
  const wdLabel = d.wild_domestic === 'W' ? 'Wild' : d.wild_domestic === 'D' ? 'Domestic' : (d.wild_domestic || '—');
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:11px;height:11px;
      border-radius:50%;
      background:${color};
      border:2px solid rgba(255,255,255,0.85);
      box-shadow:0 1px 4px rgba(0,0,0,0.3);
      cursor:pointer;
    "></div>`,
    iconSize: [11,11], iconAnchor: [5.5,5.5],
  });

  const m = L.marker([d.lat, d.lon], {icon});

  m.on('mouseout', () => {
    tooltip.style.display = 'none';
  });

  m.bindPopup(`
      <b>Excavation site:</b> ${d.site}<br>
      <b>Sample:</b> ${d.sample}<br>
      <b>DMRT3:</b> ${d.dmrt3} <br>
      <b>Age range:</b> ${d.age || '—'}
    </div>
  `, {maxWidth: 230});
  return m;
}

function updateMap(sliderYear) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const visible = mode === 'cumulative'
    ? DATA.filter(d => d.year <= sliderYear)
    : DATA.filter(d => Math.abs(d.year - sliderYear) <= 500);

  visible.forEach(d => {
    const m = makeMarker(d);
    m.addTo(map);
    markers.push(m);
  });

  document.getElementById('year-display').textContent = yearLabel(sliderYear);
  document.getElementById('period-display').textContent = periodLabel(sliderYear);
  document.getElementById('count-display').textContent =
    visible.length + ' sample' + (visible.length !== 1 ? 's' : '') + ' visible';
}

const slider = document.getElementById('tl-slider');
slider.addEventListener('input', () => updateMap(parseInt(slider.value)));

function setMode(m) {
  mode = m;
  document.getElementById('btn-cumulative').classList.toggle('active', m === 'cumulative');
  document.getElementById('btn-window').classList.toggle('active', m === 'window');
  updateMap(parseInt(slider.value));
}

function togglePlay() {
  if (playing) {
    clearInterval(playInterval);
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
  } else {
    playing = true;
    document.getElementById('btn-play').textContent = '⏸ Pause';
    playInterval = setInterval(() => {
      let val = parseInt(slider.value) + 50;
      if (val > 1000) val = -5354;
      slider.value = val;
      updateMap(val);
    }, 120);
  }
}

function resetSlider() {
  if (playing) togglePlay();
  slider.value = 1000;
  updateMap(1000);
}

updateMap(1000);
</script>
